name: Daily Inspection Reminders

on:
  schedule:
    - cron: '0 20 * * *'
  workflow_dispatch:
    inputs:
      api_base_url:
        description: 'Override API base URL (leave blank to use secret)'
        required: false

jobs:
  send-reminders:
    name: Send inspection reminder emails
    runs-on: ubuntu-latest
    steps:
      - name: Send inspection reminders
        run: |
          BASE_URL="${{ inputs.api_base_url || secrets.API_BASE_URL }}"
          if [ -z "$BASE_URL" ]; then
            echo "Error: API_BASE_URL secret is not set"
            exit 1
          fi
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST "${BASE_URL}/api/internal/send-inspection-reminders" \
            -H "X-Internal-Secret: ${{ secrets.INTERNAL_API_SECRET }}" \
            -H "Content-Type: application/json")
          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | head -n -1)
          echo "HTTP Status: $HTTP_CODE"
          echo "Response: $BODY"
          if [ "$HTTP_CODE" != "200" ]; then
            echo "Error: Reminder endpoint returned HTTP $HTTP_CODE"
            exit 1
          fi
